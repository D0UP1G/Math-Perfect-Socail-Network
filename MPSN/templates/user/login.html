<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Doupig</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #000; --text: #e7e9ea; --muted: #71767b;
            --border: #2f3336; --card: #16181c; --blue: #1d9bf0; --pink: #f85149;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glow {
            position: fixed; inset: 0; pointer-events: none;
            background: radial-gradient(ellipse at 20% 30%, rgba(29,155,240,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 70%, rgba(29,155,240,0.06) 0%, transparent 50%);
        }
        .box {
            background: rgba(22,24,28,0.95);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }
        .logo { text-align: center; font-size: 44px; color: var(--blue); margin-bottom: 24px; }
        .box-title { font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 6px; }
        .box-sub { color: var(--muted); text-align: center; font-size: 15px; margin-bottom: 28px; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 8px; color: var(--muted); }
        .input-wrap { position: relative; }
        .input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }
        .form-control {
            width: 100%;
            padding: 14px 14px 14px 44px;
            background: #0d0f11;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 15px;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .form-control:focus { outline: none; border-color: var(--blue); }

        .error-msg {
            background: rgba(248,81,73,0.1);
            border: 1px solid rgba(248,81,73,0.3);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--pink);
            font-size: 14px;
            margin-bottom: 16px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--blue); color: #fff; margin-bottom: 20px; }
        .btn-primary:hover { background: #1a8cd8; }

        .divider { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 13px; margin: 4px 0 20px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .switch { text-align: center; color: var(--muted); font-size: 15px; }
        .switch a { color: var(--blue); font-weight: 600; text-decoration: none; }
        .switch a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="box">
        <div class="logo"><i class="fab fa-x-twitter"></i></div>
        <div class="box-title">Вход</div>
        <div class="box-sub">Войдите, чтобы продолжить</div>

        {% if errors %}
        <div class="error-msg"><i class="fas fa-exclamation-circle"></i> {{ errors }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Имя пользователя</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    {{ form.username }}
                </div>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    {{ form.password }}
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Войти</button>
        </form>

        <div class="divider"><span>или</span></div>
        <div class="switch">Нет аккаунта? <a href="{% url 'user:register' %}">Зарегистрироваться</a></div>
    </div>

    <script>
        document.querySelectorAll('input').forEach(el => el.classList.add('form-control'));
    </script>
</body>
</html>
